; =============================================================================
; FORTNITE NEXUS - PRO SETTINGS PACK
; =============================================================================
; Version: 2.1 (Chapter 6, Season 2 - April 2026)
; Author: Fortnite Nexus
; Target: 240+ FPS @ 1080p (Mid-High End PCs)
; Tested on: RTX 3060/4060+, Ryzen 5 5600/i5-12400+, 16GB RAM+
;
; INSTALLATION:
; 1. Close Fortnite completely (Epic Launcher must be closed too)
; 2. Backup your current GameUserSettings.ini (rename to .backup)
; 3. Copy this file to:
;    %LOCALAPPDATA%\FortniteGame\Saved\Config\WindowsClient\
; 4. Right-click → Properties → Read-Only (so Fortnite doesn't overwrite)
; 5. Launch Fortnite, go to Settings → re-confirm Resolution and FOV
;
; IMPORTANT:
; - These settings prioritize competitive performance over visuals
; - Adjust ResolutionSizeX/Y if not playing at 1920x1080
; - For Performance Mode, see GameUserSettings.Performance.ini
; =============================================================================

[/Script/FortniteGame.FortGameUserSettings]
bUseDesiredScreenHeight=False
DesiredScreenWidth=1920
DesiredScreenHeight=1080
LastConfirmedDesiredScreenHeight=1080
LastConfirmedDesiredScreenWidth=1920
LastUserConfirmedDesiredScreenWidth=1920
LastUserConfirmedDesiredScreenHeight=1080

; --- INPUT SENSITIVITY (Pro-Standard 8% / 8% / 60% ADS) ---
MouseSensitivityX=0.080000
MouseSensitivityY=0.080000
MouseTargetingSensitivity=0.600000
MouseScopeSensitivity=0.600000
GamepadSensitivityX=0.500000
GamepadSensitivityY=0.500000
GamepadTargetingSensitivity=0.500000
GamepadScopeSensitivity=0.500000

; --- COMPETITIVE EDIT SENSITIVITY ---
TouchSensitivityX=0.5
TouchSensitivityY=0.5
TouchTargetingSensitivity=0.5
TouchScopeSensitivity=0.5

; --- AUDIO (Footstep-optimiert für Competitive) ---
SoundVolume=0.35
MusicVolume=0.0
VoiceChatVolume=1.0
SoundEffectsVolume=0.85
DialogueVolume=0.5
UIVolume=0.5
CinematicsVolume=0.5
HighQualityAudio=False
SubtitlesEnabled=False
VisualizeAudio=True
VisualizeAudioForLowVolumeOcclusion=True

; --- ACCESSIBILITY (Visualizer für Competitive empfohlen) ---
ColorBlindMode=2
ColorBlindStrength=10
StreamerModeEnabled=False
bColorBlindFortMode=True

; --- HUD & UI ---
HUDLeftBound=0.000000
HUDTopBound=0.000000
HUDRightBound=0.000000
HUDBottomBound=0.000000
ShowFPS=True
bShowNetStats=False
bShowGameStatusMessages=True

[/Script/FortniteGame.FortLocalPlayer]
StreamingDistance=1.0

[ScalabilityGroups]
; --- GRAFIK (alle auf LOW für maximale FPS) ---
sg.ResolutionQuality=100.000000
sg.ViewDistanceQuality=2
sg.AntiAliasingQuality=0
sg.ShadowQuality=0
sg.GlobalIlluminationQuality=0
sg.ReflectionQuality=0
sg.PostProcessQuality=0
sg.TextureQuality=2
sg.EffectsQuality=0
sg.FoliageQuality=0
sg.ShadingQuality=0

[/Script/Engine.GameUserSettings]
bUseVSync=False
bUseDynamicResolution=False
ResolutionSizeX=1920
ResolutionSizeY=1080
LastUserConfirmedResolutionSizeX=1920
LastUserConfirmedResolutionSizeY=1080
WindowPosX=-1
WindowPosY=-1
FullscreenMode=0
LastConfirmedFullscreenMode=0
PreferredFullscreenMode=0
Version=5
AudioQualityLevel=0
LastConfirmedAudioQualityLevel=0
FrameRateLimit=240.000000
DesiredScreenWidth=1920
bUseDesiredScreenHeight=False
DesiredScreenHeight=1080
LastUserConfirmedDesiredScreenWidth=1920
LastUserConfirmedDesiredScreenHeight=1080
LastRecommendedScreenWidth=-1.000000
LastRecommendedScreenHeight=-1.000000
LastCPUBenchmarkResult=-1.000000
LastGPUBenchmarkResult=-1.000000
LastGPUBenchmarkMultiplier=1.000000
bUseHDRDisplayOutput=False
HDRDisplayOutputNits=1000

; --- ADVANCED PERFORMANCE FLAGS ---
PreferredRegion=eu
HasSeenHDRCalibration=True
HasUnlockedHDRViaPlayingClassics=True

[FortRenderingSettings]
RenderingMode=DirectX12
PreferredThreadingMode=Performance
bUseSimpleHUD=True
bDLSSEnabled=False
bDLSSFrameGeneration=False
bRayTracingEnabled=False
bNVIDIAReflexEnabled=True
