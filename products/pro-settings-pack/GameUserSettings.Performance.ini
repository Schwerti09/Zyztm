; =============================================================================
; FORTNITE NEXUS - PRO SETTINGS PACK
; PERFORMANCE MODE Variante (Low-End / 144 FPS Target)
; =============================================================================
; Version: 2.1 (Chapter 6, Season 2 - April 2026)
; Target: 144+ FPS @ 1080p (Low-End / Mid PCs)
; Tested on: GTX 1060/1660 / RX 580+, i5-8400/Ryzen 5 3600+, 8-16GB RAM
;
; INSTALLATION (gleich wie Standard-Variante):
; 1. Fortnite + Epic Launcher schließen
; 2. Backup deiner aktuellen GameUserSettings.ini machen
; 3. Diese Datei → umbenennen zu GameUserSettings.ini
; 4. Kopieren nach:
;    %LOCALAPPDATA%\FortniteGame\Saved\Config\WindowsClient\
; 5. Read-Only setzen
; 6. In Fortnite zusätzlich: Settings → Video → "Performance Mode" aktivieren
;
; HINWEIS:
; - Performance Mode ändert die Rendering-Pipeline (kein Texture Streaming)
; - Beste Wahl für Low-End PCs unter 8GB RAM
; - View Distance auf "Near" für bestmögliche Loot-Spawn-Performance
; =============================================================================

[/Script/FortniteGame.FortGameUserSettings]
bUseDesiredScreenHeight=False
DesiredScreenWidth=1920
DesiredScreenHeight=1080

; --- PRO STANDARD SENS (8/8/60) ---
MouseSensitivityX=0.080000
MouseSensitivityY=0.080000
MouseTargetingSensitivity=0.600000
MouseScopeSensitivity=0.600000

; --- AUDIO ---
SoundVolume=0.30
MusicVolume=0.0
VoiceChatVolume=1.0
SoundEffectsVolume=0.85
HighQualityAudio=False
VisualizeAudio=True

; --- ACCESSIBILITY ---
ColorBlindMode=2
ColorBlindStrength=10
bColorBlindFortMode=True

; --- PERFORMANCE MODE FLAGS ---
bUseLowQualityModes=True
PerformanceMode=2
HUDLeftBound=0.000000

[ScalabilityGroups]
sg.ResolutionQuality=100.000000
sg.ViewDistanceQuality=1
sg.AntiAliasingQuality=0
sg.ShadowQuality=0
sg.GlobalIlluminationQuality=0
sg.ReflectionQuality=0
sg.PostProcessQuality=0
sg.TextureQuality=0
sg.EffectsQuality=0
sg.FoliageQuality=0
sg.ShadingQuality=0

[/Script/Engine.GameUserSettings]
bUseVSync=False
bUseDynamicResolution=False
ResolutionSizeX=1920
ResolutionSizeY=1080
FullscreenMode=0
PreferredFullscreenMode=0
FrameRateLimit=144.000000
AudioQualityLevel=0

[FortRenderingSettings]
RenderingMode=Performance
PreferredThreadingMode=Performance
bUseSimpleHUD=True
bDLSSEnabled=False
bRayTracingEnabled=False
bNVIDIAReflexEnabled=True
bNVIDIAReflexBoostEnabled=False
bMeshTextureBakingEnabled=False

[/Script/FortniteGame.FortConsoleVariables]
r.Streaming.PoolSize=1024
r.Streaming.HLODStrategy=2
r.MaxAnisotropy=2
r.OneFrameThreadLag=0
r.Vulkan.UseRealUBs=1

; =============================================================================
; END
; =============================================================================
