version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: zyztm
      POSTGRES_USER: zyztm
      POSTGRES_PASSWORD: zyztm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  api:
    build: ./apps/api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://zyztm:zyztm_password@postgres:5432/zyztm
    depends_on:
      - postgres
  
  web:
    build: ./apps/web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
