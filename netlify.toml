[build]
  command = "pnpm run build"
  publish = "apps/web/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.15.9"

# Cache headers – prevent stale deployments from being served
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API proxy – Netlify Functions handle /api/* requests
[[redirects]]
  from = "/api/stripe/create-checkout"
  to = "/.netlify/functions/stripe-create-checkout"
  status = 200

[[redirects]]
  from = "/api/stripe/create-coin-checkout"
  to = "/.netlify/functions/stripe-create-coin-checkout"
  status = 200

[[redirects]]
  from = "/api/debug/youtube"
  to = "/.netlify/functions/debug-youtube"
  status = 200

[[redirects]]
  from = "/api/youtube/latest"
  to = "/.netlify/functions/youtube-latest"
  status = 200

[[redirects]]
  from = "/api/youtube/videos"
  to = "/.netlify/functions/get-youtube-videos"
  status = 200

[[redirects]]
  from = "/api/clips/by-tag/*"
  to = "/.netlify/functions/clips-by-tag"
  status = 200

[[redirects]]
  from = "/api/clips/by-tag"
  to = "/.netlify/functions/clips-by-tag"
  status = 200

[[redirects]]
  from = "/api/clips/top"
  to = "/.netlify/functions/clips-top"
  status = 200

[[redirects]]
  from = "/api/gallery"
  to = "/.netlify/functions/gallery"
  status = 200

[[redirects]]
  from = "/api/tiktok/latest"
  to = "/.netlify/functions/tiktok-latest"
  status = 200

[[redirects]]
  from = "/api/tiktok/manual"
  to = "/.netlify/functions/tiktok-manual"
  status = 200

[[redirects]]
  from = "/api/tiktok/like"
  to = "/.netlify/functions/tiktok-like"
  status = 200

[[redirects]]
  from = "/api/tiktok/liked"
  to = "/.netlify/functions/tiktok-liked"
  status = 200

# Fallback SPA route – must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scheduled functions
[functions."fetch-clips"]
  schedule = "0 */6 * * *"

[functions."fetch-youtube-clips"]
  schedule = "0 0 * * *"

[functions."fetch-tiktok-clips"]
  schedule = "0 6 * * *"
