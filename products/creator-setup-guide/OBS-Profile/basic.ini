; =============================================================================
; OBS PROFILE: Fortnite Nexus Pro Streaming Profile
; =============================================================================
; Version: 1.0 (April 2026)
; Compatible with: OBS Studio 30.x
;
; INSTALLATION:
; 1. Schließe OBS
; 2. Kopiere den Ordner "Fortnite-Nexus-Pro" nach:
;    %APPDATA%\obs-studio\basic\profiles\
; 3. Öffne OBS → Profile → "Fortnite-Nexus-Pro" auswählen
; 4. Stream-Key in Einstellungen → Stream eintragen
; =============================================================================

[General]
Name=Fortnite-Nexus-Pro

[Video]
BaseCX=1920
BaseCY=1080
OutputCX=1920
OutputCY=1080
FPSCommon=60
FPSType=0
ScaleType=lanczos
ColorFormat=NV12
ColorSpace=601
ColorRange=Partial

[Audio]
SampleRate=48000
ChannelSetup=Stereo
DesktopAudioDevice1=default
AuxAudioDevice1=default
PeakMeterType=1
MonitoringDeviceName=Default

[Output]
Mode=Advanced
RecType=Standard
FilenameFormatting=%CCYY-%MM-%DD %hh-%mm-%ss

[AdvOut]
TrackIndex=1
RecTracks=1
ApplyServiceSettings=true
RecRBSize=512
Encoder=jim_nvenc
RescaleRes=1920x1080
RecEncoder=jim_nvenc
RecRescaleRes=1920x1080
RecFormat2=mkv

[AdvOut.Recording]
RecFormat=mkv
RecQuality=2

[Stream1]
service=Twitch
server=auto
key=YOUR_STREAM_KEY_HERE
bwtest=false
ignore_recommended=false

[SimpleOutput]
RecFormat=mkv
RecRB=false
StreamEncoder=jim_nvenc
RecEncoder=jim_nvenc
Preset=Quality
NVENCPreset=Quality
RecQuality=Stream
VBitrate=6000
ABitrate=160

[Hotkeys]
OBSBasic.StartStreaming=[]
OBSBasic.StopStreaming=[]
OBSBasic.StartRecording=[]
OBSBasic.StopRecording=[]
OBSBasic.MuteSource={"FortniteNexus":[{"key":"OBS_KEY_M","control":true,"alt":false,"shift":true,"command":false}]}
