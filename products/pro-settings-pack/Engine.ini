; =============================================================================
; FORTNITE NEXUS - Engine.ini Optimierungen
; =============================================================================
; Diese Datei aktiviert Render-Optimierungen, die nicht über das normale
; Settings-Menü zugänglich sind. Macht Stretched-Rendering und ein paar
; Low-Level Tweaks möglich.
;
; INSTALLATION:
; 1. Datei kopieren nach:
;    %LOCALAPPDATA%\FortniteGame\Saved\Config\WindowsClient\Engine.ini
; 2. Read-Only setzen
;
; WARNUNG:
; - Stretched Resolution wurde von Epic im Chapter 4 weitgehend entfernt
; - Manche Tweaks können bei Anti-Cheat-Updates entfernt werden
; - Bei Problemen: Datei löschen, Fortnite generiert neue
; =============================================================================

[/Script/Engine.RendererSettings]
r.SeparateTranslucency=False
r.PostProcessAAQuality=0
r.MotionBlurQuality=0
r.BloomQuality=0
r.LightShaftQuality=0
r.ScreenPercentage=100
r.AmbientOcclusionLevels=0
r.DepthOfFieldQuality=0
r.SSR.Quality=0
r.LensFlareQuality=0
r.MaxAnisotropy=4

[SystemSettings]
r.OneFrameThreadLag=0
r.FinishCurrentFrame=0
r.GTSyncType=1
r.RHICmdBypass=0

[ConsoleVariables]
fort.AthenaLoadoutClassicSplitSeasonGate=0
fort.MattClipboardEnabled=1

[Core.System]
Paths=../../../Engine/Content
Paths=%GAMEDIR%Content
Paths=../../../FortniteGame/Plugins/SaveTheWorld/Content
Paths=../../../FortniteGame/Plugins/CrossPlatformChat/Content
Paths=../../../Engine/Plugins/Runtime/OculusVR/Content

; =============================================================================
; END
; =============================================================================
