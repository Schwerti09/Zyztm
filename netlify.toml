[build]
  command = "pnpm run build"
  publish = "apps/web/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.15.9"

# Cache headers – prevent stale deployments from being served
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── DOMAIN CONSOLIDATION – Redirect all variants to canonical domain ──
# CRITICAL: These redirects ensure all traffic flows to fortnitenexus.com
# preventing authority dilution between netlify.app and .com

# Redirect www to apex (canonical)
[[redirects]]
  from = "https://www.fortnitenexus.com/*"
  to = "https://fortnitenexus.com/:splat"
  status = 301
  force = true

# Redirect netlify.app to canonical (CRITICAL for SEO)
[[redirects]]
  from = "https://fortnitenexus.netlify.app/*"
  to = "https://fortnitenexus.com/:splat"
  status = 301
  force = true

# ── SEO: 301 Redirects – old non-language URLs → /de/* (German as primary) ──
# These preserve link equity after the multi-language rollout
[[redirects]]
  from = "/guide/:slug"
  to = "/de/guide/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/guides/:category"
  to = "/de/guides/:category"
  status = 301
  force = true

[[redirects]]
  from = "/runbook/:slug"
  to = "/de/guide/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/runbooks/:category"
  to = "/de/guides/:category"
  status = 301
  force = true

# Sitemap – generated by Netlify Function
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Robots.txt
[[redirects]]
