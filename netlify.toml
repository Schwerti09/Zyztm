# =============================================================================
# DIGITAL PRODUCTS SHOP - Stripe + Supabase Integration
# =============================================================================

# Create Checkout Session (initiates Stripe checkout)
[[redirects]]
  from = "/api/checkout/create"
  to = "/.netlify/functions/create-checkout"
  status = 200

# Get Checkout Session (for success page)
[[redirects]]
  from = "/api/checkout/session"
  to = "/.netlify/functions/get-checkout-session"
  status = 200

# Stripe Webhook (receives payment events)
[[redirects]]
  from = "/api/webhooks/stripe"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# Process Download (verifies token and returns signed URL)
[[redirects]]
  from = "/api/download/process"
  to = "/.netlify/functions/process-download"
  status = 200

# Fortnite Nexus - Subscriptions API
[[redirects]]
  from = "/api/subscriptions/plans"
